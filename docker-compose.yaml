services:
  redis:
    image: redis:alpine
    ports:
      - 6379:6379
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
  celery-worker:
    image: celery-worker:latest
#    build:
#      context: ./app
#      dockerfile: celery.Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
#    ports:
#      - 5672:5672
    command:  ["celery", "--app=tasks", "worker", "-l", "INFO"]
  celery-beat:
    image: celery-worker:latest
#    build:
#      context: ./app
#      dockerfile: celery.Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
    ports:
      - 5672:5672
    command:  ["celery", "--app=tasks", "beat", "-l", "INFO"]
